name: Python Linting

on:
  push:
    branches:
      - stable
      - develop
      - 'pp-*'
  pull_request:
    branches:
      - stable
      - develop
      - 'pp-*'
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install ruff black

      - name: Run Ruff (линтер + автоисправление)
        run: ruff check .

      - name: Check Black formatting
        run: black --check .
